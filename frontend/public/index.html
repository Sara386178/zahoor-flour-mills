<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="description" content="Zahoor Flour Mills - Pure Quality, Natural Taste. Premium flour products for households and businesses across Pakistan." />
  <meta name="theme-color" content="#0a0a0a" />
  <title>Zahoor Flour Mills | Pure Quality, Natural Taste</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500;600;700;800&family=Inter:wght@300;400;500;600;700&family=Cormorant+Garamond:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    /* Inline critical CSS for fast first paint */
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Inter', sans-serif; background: #faf7f0; color: #0a0a0a; overflow-x: hidden; }
    #root { min-height: 100vh; }
    .initial-loader { display:flex; align-items:center; justify-content:center; min-height:100vh; background:#0a0a0a; }
    .initial-loader-spinner { width:50px; height:50px; border:4px solid #1a1a1a; border-top:4px solid #c8a951; border-radius:50%; animation:spin 1s linear infinite; }
    @keyframes spin { to { transform:rotate(360deg); } }
  </style>
</head>
<body>
  <noscript>You need to enable JavaScript to run Zahoor Flour Mills website.</noscript>
  <div id="root">
    <div class="initial-loader"><div class="initial-loader-spinner"></div></div>
  </div>
</body>
</html>
