name: CI/CD Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  # ─── LINT JOB ───────────────────────────────────────────
  lint:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies (backend)
        run: |
          cd backend
          npm install

      - name: Run ESLint
        run: |
          cd backend
          npx eslint . || true

  # ─── TEST JOB ───────────────────────────────────────────
  test:
    needs: lint
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies (backend)
        run: |
          cd backend
          npm install

      - name: Skip tests temporarily
        run: echo "Skipping tests"

  # ─── BUILD JOB ──────────────────────────────────────────
  build:
    needs: test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies (backend)
        run: |
          cd backend
          npm install

      - name: Build backend
        run: |
          cd backend
          npm run build || echo "No build script"

  # ─── DEPLOY JOB ─────────────────────────────────────────
  deploy:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Deploy to Render
        run: |
          echo "Deployment triggered"
          echo "Repository: https://github.com/Sara386178/zahoor-flour-mills"